                <div class="col-lg-5 pe-lg-5">
                    <p class="text-uppercase fw-bold mb-3 d-flex align-items-center justify-content-center justify-content-md-start">
                        
                        
                    </p>

                    <p class="text-light opacity-75 small lh-lg mb-0">
                        
                    </p>
                </div>

                <div class="col-lg-3">

                    <ul class="list-unstyled mb-0 d-flex flex-column gap-2">

                    <div class="d-flex gap-2 justify-content-center justify-content-md-start flex-wrap">

            <div class="row align-items-center">

                    <p class="small">
                        
                    </p>
                </div>

            </div>

    <style>
        .custom-hover:hover { opacity: 1 !important; text-decoration: underline !important; }
        #searchResults::-webkit-scrollbar { width: 6px; }
        #searchResults::-webkit-scrollbar-thumb { background-color: #ccc; border-radius: 4px; }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const searchInput = document.getElementById('searchInput');
            const searchResults = document.getElementById('searchResults');
            let postsData = [];

            try {
                const response = await fetch('/posts.json');
                if (response.ok) {
                    postsData = await response.json();
                }
            } catch (error) {
                console.error("Erro ao carregar o banco de pesquisa.");
            }

            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                searchResults.innerHTML = '';

                if (query.length < 2) {
                    searchResults.classList.add('d-none');
                    return;
                }

                const filteredPosts = postsData.filter(post =>
                    post.title.toLowerCase().includes(query)
                );

                if (filteredPosts.length > 0) {
                    filteredPosts.forEach(post => {
                        const link = document.createElement('a');
                        link.href = `/${post.slug}/`;
                        link.className = 'list-group-item list-group-item-action d-flex align-items-center border-0 border-bottom';

                        const imgHtml = post.image
                            ? `<img src="${post.image}" class="rounded me-3 object-fit-cover" style="width: 45px; height: 45px;">`
                            : `<div class="bg-secondary rounded me-3 opacity-25" style="width: 45px; height: 45px;"></div>`;

                        link.innerHTML = `
                            ${imgHtml}
                            <div class="overflow-hidden">
                                <h6 class="mb-0 text-truncate text-dark fw-bold" style="font-size: 0.9rem;">${post.title}</h6>
                                <small class="text-muted" style="font-size: 0.75rem;">${post.date}</small>
                            </div>
                        `;
                        searchResults.appendChild(link);
                    });
                    searchResults.classList.remove('d-none');
                } else {
                    searchResults.innerHTML = '<div class="list-group-item text-muted text-center py-3 border-0 small">Nenhum artigo encontrado.</div>';
                    searchResults.classList.remove('d-none');
                }
            });

            document.addEventListener('click', (e) => {
                if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                    searchResults.classList.add('d-none');
                }
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
