        .content img { max-width: 100%; height: auto; border-radius: 8px; margin: 1.5rem 0; }

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const searchInput = document.getElementById('searchInput');
            const searchResults = document.getElementById('searchResults');
            const dynamicRecentPosts = document.getElementById('dynamicRecentPosts');
            let postsData = [];

            try {
                const response = await fetch('/posts.json');
                if (response.ok) {
                    postsData = await response.json();

                    if (dynamicRecentPosts && postsData.length > 0) {
                        const currentSlug = window.location.pathname.replace(/\//g, '');
                        const recent = postsData.filter(p => p.slug !== currentSlug).slice(0, 6);

                        recent.forEach(post => {
                            const imgHtml = post.image
                                ? `<a href="/${post.slug}/" class="flex-shrink-0"><img src="${post.image}" alt="${post.title}" class="rounded shadow-sm object-fit-cover" style="width: 75px; height: 90px;"></a>`
                                : `<a href="/${post.slug}/" class="flex-shrink-0 bg-secondary rounded shadow-sm d-flex align-items-center justify-content-center text-white text-decoration-none" style="width: 75px; height: 90px;"><i class="bi bi-image fs-4"></i></a>`;

                            const postHtml = `
                                <div class="d-flex align-items-center">
                                    ${imgHtml}
                                    <div class="ms-3">
                                        <small class="text-uppercase text-muted fw-bold d-block mb-1" style="font-size: 0.65rem; letter-spacing: 1px;">
                                            <i class="bi bi-calendar3"></i> ${post.date}
                                        </small>
                                        <h5 class="h6 mb-0 fw-bold lh-sm">
                                            <a href="/${post.slug}/" class="text-decoration-none text-dark custom-hover">${post.title}</a>
                                        </h5>
                                    </div>
                                </div>
                            `;
                            dynamicRecentPosts.innerHTML += postHtml;
                        });
                    }
                }
            } catch (error) { console.error("Erro ao carregar banco."); }

            // Lógica da Busca
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                searchResults.innerHTML = '';

                if (query.length < 2) {
                    searchResults.classList.add('d-none');
                    return;
                }

                const filteredPosts = postsData.filter(post => post.title.toLowerCase().includes(query));

                if (filteredPosts.length > 0) {
                    filteredPosts.forEach(post => {
                        const link = document.createElement('a');
                        link.href = `/${post.slug}/`;
                        link.className = 'list-group-item list-group-item-action d-flex align-items-center border-0 border-bottom';
                        const imgHtml = post.image ? `<img src="${post.image}" class="rounded me-3 object-fit-cover" style="width: 45px; height: 45px;">` : `<div class="bg-secondary rounded me-3 opacity-25" style="width: 45px; height: 45px;"></div>`;
                        link.innerHTML = `${imgHtml}<div class="overflow-hidden"><h6 class="mb-0 text-truncate text-dark fw-bold" style="font-size: 0.9rem;">${post.title}</h6><small class="text-muted" style="font-size: 0.75rem;">${post.date}</small></div>`;
                        searchResults.appendChild(link);
                    });
                    searchResults.classList.remove('d-none');
                } else {
                    searchResults.innerHTML = '<div class="list-group-item text-muted text-center py-3 border-0 small">Nenhum artigo encontrado.</div>';
                    searchResults.classList.remove('d-none');
                }
            });

            document.addEventListener('click', (e) => {
                if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                    searchResults.classList.add('d-none');
                }
            });
        });
    </script>
